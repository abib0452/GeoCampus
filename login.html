<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoCampus Login</title>

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;

    background:
        radial-gradient(circle at top left,#FFF9EC 0%,transparent 35%),
        radial-gradient(circle at bottom right,#F5D98A 0%,transparent 30%),
        linear-gradient(135deg,#FFF8EF 0%,#F8E9C9 50%,#EED7A7 100%);
}

.login-box{

    width:100%;
    max-width:430px;

    padding:45px 35px;

    border-radius:28px;

    background:rgba(255,255,255,0.72);

    backdrop-filter:blur(25px);

    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        0 20px 50px rgba(0,0,0,.12),
        0 8px 20px rgba(212,175,55,.20);

    text-align:center;

    color:#1E293B;

    transition:.35s ease;

}

.login-box:hover{

    transform:translateY(-4px);

    box-shadow:
        0 25px 60px rgba(0,0,0,.16),
        0 12px 30px rgba(212,175,55,.28);

}

h1{

    color:#7A5A00;

    font-size:38px;

    font-weight:700;

    letter-spacing:1px;

    margin-bottom:10px;

}

p{

    color:#666;

    font-size:16px;

    line-height:1.6;

    margin-bottom:28px;

}
input{

    width:100%;

    height:58px;

    margin:12px 0;

    padding:0 18px;

    border-radius:14px;

    border:2px solid #E2C15B;

    background:rgba(255,255,255,.92);

    font-size:17px;

    color:#333;

    transition:.3s ease;

}
input::placeholder{

    color:#8A8A8A;

}



button{

    width:100%;

    height:58px;

    margin-top:18px;

    border:none;

    border-radius:14px;

    background:linear-gradient(135deg,#D4AF37,#F0C64A);

    color:#111;

    font-size:20px;

    font-weight:700;

    cursor:pointer;

    transition:.3s;

}
button:hover{

    transform:translateY(-2px);

    box-shadow:0 12px 24px rgba(212,175,55,.35);

}

.register{

    margin-top:25px;

    color:#555555;

    font-size:15px;

}

.register a{

    color:#8B6B00;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}

.register a:hover{

    color:#A67C00;

    text-decoration:underline;

}

/* ================= MOBILE RESPONSIVE ================= */

/* ================= MOBILE RESPONSIVE ================= */

@media (max-width:768px){

    body{

    padding:20px;

    justify-content:center;

    align-items:center;

    overflow-y:auto;

}
   .login-box{

    width:100%;

    max-width:420px;

    padding:30px 22px;

    border-radius:20px;

}

    h1{
        font-size:32px;
    }

    p{
        font-size:16px;
    }

    input{

    height:52px;

    font-size:16px;

}

    button{

    height:52px;

    font-size:17px;

}

    .register{
        font-size:16px;
    }

}

.password-box{

    position:relative;

    width:100%;

}

.password-box input{

    padding-right:55px;

}



    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>

    <div class="login-box">

        

        <h1>GeoCampus</h1>

        <p>
            Geo-Fenced College Campus Personnel Locator
        </p>

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <div class="password-box">

    <input
        type="password"
        id="password"
        placeholder="Enter Geocampus Password">

   

</div>

        <button onclick="login()">
            Login
        </button>

        <p id="status"
style="margin-top:15px;
color:#8B6B00;
font-weight:bold;">
</p>

        <div style="margin-top:12px; text-align:center;">
    <a href="forgotpassword.html"
style="color:#8B6B00;
text-decoration:none;
font-size:15px;
font-weight:600;">
Forgot Password?
</a>
</div>

        <div class="register">
            Don't have an account?
            <a href="register.html">
                Register
            </a>
        </div>

    </div>

    <script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvso-H8NVsXxpULHOplG_WketgfI4ErEk",
  authDomain: "geocampus-2026.firebaseapp.com",
  projectId: "geocampus-2026",
  storageBucket: "geocampus-2026.firebasestorage.app",
  messagingSenderId: "1090387175062",
  appId:"1:1090387175062:web:24abb9b76e8ac2bcc084b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const db = getFirestore(app);

async function login(){

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    if(email === "" || password === ""){

        alert("Enter Email and Password");
        return;

    }

   document.getElementById("status").innerHTML =
"Approval link sent to your email...<br>Waiting for approval...";

try {

    try {

    await signInWithEmailAndPassword(
        auth,
        email,
        password
    );

} catch (error) {

    if (
        error.code === "auth/invalid-credential" ||
        error.code === "auth/wrong-password" ||
        error.code === "auth/user-not-found"
    ) {

        alert("❌ Invalid Email or Password");
        return;

    }

    alert(error.message);
    return;
}

    const response = await fetch("https://geocampus-api.onrender.com/request-login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email
        })
    });

    const data = await response.json();

    const token = data.token;

const interval = setInterval(async () => {

    const res = await fetch(
        "https://geocampus-api.onrender.com/check-login/" + token
    );

    const result = await res.json();

    if(result.approved){

    clearInterval(interval);

    window.location.href = "dashboard.html";

}
});

    document.getElementById("status").innerHTML =
"📩 Approval email sent.<br>Waiting for your approval...";


console.log("Firebase Login Success");

const user = auth.currentUser;


console.log(user);


await addDoc(
    collection(db, "loginHistory"),
    {
        uid: user.uid,
        email: user.email,
        loginTime: new Date().toLocaleString(),
        device: navigator.platform,
        browser: navigator.userAgent
    }
);


} catch (error) {

    console.error(error);

    alert(error.message);

}
}

window.login = login;

window.togglePassword = function(){

    const password = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");

    if(password.type === "password"){

        password.type = "text";
        eyeIcon.textContent = "visibility_off";

    }else{

        password.type = "password";
        eyeIcon.textContent = "visibility";

    }

}
        
    </script>

</body>
</html>
