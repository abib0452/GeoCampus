<!DOCTYPE html>
<html>
<head>
    <title>GeoCampus Login</title>

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #FDF6EC 0%,
        #F7E7CE 50%,
        #EAD7BB 100%
    );
}

.login-box{

    width:420px;

    background:rgba(255,255,255,.65);

    backdrop-filter:blur(18px);

    border:2px solid #D4AF37;

    border-radius:24px;

    padding:40px;

    text-align:center;

    color:#1E293B;

    box-shadow:
    0 12px 35px rgba(0,0,0,.15),
    0 0 20px rgba(212,175,55,.25);

}



h1{

    color:#8B6B00;

    font-size:34px;

    margin-bottom:10px;

    font-weight:bold;

}

p{

    margin-bottom:25px;

    color:#555;

    font-size:15px;

}

input{

    width:100%;

    height:52px;

    margin:12px 0;

    padding-left:15px;

    background:#FFFDF8;

    color:#333333;

    border:2px solid #D4AF37;

    border-radius:12px;

    font-size:16px;

    outline:none;

    transition:.3s;

}

input::placeholder{

    color:#8A8A8A;

}
input:focus{

    background:white;

    border-color:#C89B2B;

    box-shadow:0 0 10px rgba(212,175,55,.35);

}

button{

    width:100%;

    height:52px;

    margin-top:18px;

    background:#D4AF37;

    color:#0F172A;

    border:none;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#F4C430;

    transform:translateY(-2px);

    box-shadow:0 8px 18px rgba(212,175,55,.35);

}

.register{

    margin-top:25px;

    color:#555555;

    font-size:15px;

}

.register a{

    color:#8B6B00;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}

.register a:hover{

    color:#A67C00;

    text-decoration:underline;

}
    </style>
</head>

<body>

    <div class="login-box">

        

        <h1>GeoCampus</h1>

        <p>
            Geo-Fenced College Campus Personnel Locator
        </p>

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <div class="password-box">

    <input
        type="password"
        id="password"
        placeholder="Enter Password">

    <span
        class="toggle-password"
        onclick="togglePassword()">

    </span>

</div>

        <button onclick="login()">
            Login
        </button>

        <p id="status"
style="margin-top:15px;
color:#8B6B00;
font-weight:bold;">
</p>

        <div style="margin-top:12px; text-align:center;">
    <a href="forgotpassword.html"
style="color:#8B6B00;
text-decoration:none;
font-size:15px;
font-weight:600;">
Forgot Password?
</a>
</div>

        <div class="register">
            Don't have an account?
            <a href="register.html">
                Register
            </a>
        </div>

    </div>

    <script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvso-H8NVsXxpULHOplG_WketgfI4ErEk",
  authDomain: "geocampus-2026.firebaseapp.com",
  projectId: "geocampus-2026",
  storageBucket: "geocampus-2026.firebasestorage.app",
  messagingSenderId: "1090387175062",
  appId:"1:1090387175062:web:24abb9b76e8ac2bcc084b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const db = getFirestore(app);

async function login(){

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    if(email === "" || password === ""){

        alert("Enter Email and Password");
        return;

    }

   document.getElementById("status").innerHTML =
"Approval link sent to your email...<br>Waiting for approval...";

try {

    try {

    await signInWithEmailAndPassword(
        auth,
        email,
        password
    );

} catch (error) {

    if (
        error.code === "auth/invalid-credential" ||
        error.code === "auth/wrong-password" ||
        error.code === "auth/user-not-found"
    ) {

        alert("❌ Invalid Email or Password");
        return;

    }

    alert(error.message);
    return;
}

    const response = await fetch("https://geocampus-api.onrender.com/request-login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email
        })
    });

    const data = await response.json();

    const token = data.token;

const interval = setInterval(async () => {

    const res = await fetch(
        "https://geocampus-api.onrender.com/check-login/" + token
    );

    const result = await res.json();

    if(result.approved){

    clearInterval(interval);

    window.location.href = "dashboard.html";

}
});

    document.getElementById("status").innerHTML =
"📩 Approval email sent.<br>Waiting for your approval...";


console.log("Firebase Login Success");

const user = auth.currentUser;


console.log(user);


await addDoc(
    collection(db, "loginHistory"),
    {
        uid: user.uid,
        email: user.email,
        loginTime: new Date().toLocaleString(),
        device: navigator.platform,
        browser: navigator.userAgent
    }
);


} catch (error) {

    console.error(error);

    alert(error.message);

}
}

window.login = login;

window.togglePassword = function(){

    const password =
    document.getElementById("password");

    if(password.type==="password"){

        password.type="text";

    }else{

        password.type="password";

    }

}

        
    </script>

</body>
</html>
