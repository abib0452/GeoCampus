<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoCampus Register</title>
    <link rel="stylesheet" href="style.css">
    
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;

    background:linear-gradient(
        135deg,
        #FDF6EC 0%,
        #F7E7CE 50%,
        #EAD7BB 100%
    );
}

.container{

    width:450px;

    background:rgba(255,255,255,.65);

    backdrop-filter:blur(18px);

    padding:40px;

    border-radius:24px;

    border:2px solid #D4AF37;

    box-shadow:
    0 12px 35px rgba(0,0,0,.15),
    0 0 20px rgba(212,175,55,.25);

    color:#1E293B;

    text-align:center;

}



h1{

    margin-bottom:25px;

    font-size:34px;

    color:#8B6B00;

}


select,
input{

    width:100%;

    height:52px;

    padding-left:15px;

    margin:10px 0;

    background:#FFFDF8;

    color:#333;

    border:2px solid #D4AF37;

    border-radius:12px;

    outline:none;

    font-size:15px;

    transition:.3s;

}

input::placeholder{

    color:#8A8A8A;

}

input:focus,
select:focus{

    background:white;

    border-color:#C89B2B;

    box-shadow:0 0 10px rgba(212,175,55,.35);

}

.login-btn,
.register-btn{

    width:100%;

    height:52px;

    margin-top:12px;

    border:none;

    border-radius:12px;

    background:#D4AF37;

    color:#1E293B;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

.login-btn:hover,
.register-btn:hover{

    background:#F4C430;

    transform:translateY(-2px);

    box-shadow:0 8px 18px rgba(212,175,55,.35);

}

#studentForm,
#staffForm,
#passwordSection{
    margin-top:15px;
    animation:fadeIn 0.4s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

input::placeholder{
    color:#666;
}

select{
    cursor:pointer;
}

@media(max-width:500px){
    .container{
        width:95%;
        padding:25px;
    }
}
</style>

</head>
<body>

<div class="container">

    <h1>Register</h1>

    <select id="userType">
        <option value="">Select User Type</option>
        <option value="student">Student</option>
        <option value="staff">Staff</option>
        
    </select>

    <br><br>

    <div id="studentForm" style="display:none;">

        <input
            type="email"
            id="studentEmail"
            placeholder="TC Arts Email (@tcarts.in)">

        <br><br>

        <input
            type="text"
            id="studentRegNo"
            placeholder="Register Number">

        <br><br>

        <button
    class="login-btn"
    onclick="sendOTP()">
    Send OTP
</button>

        <br><br>

        <input
    type="text"
    id="otp"
    placeholder="Enter OTP">

    
    <br><br>

    <button
class="register-btn"
onclick="verifyOTP()">

Verify OTP

</button>

<p
id="otpMessage"
style="
display:none;
font-weight:bold;
margin-top:10px;">

</p>

<p
id="resendBtn"
onclick="resendOTP()"
style="
margin-top:10px;
font-size:14px;
color:#8B6B00;
text-align:center;
cursor:not-allowed;
pointer-events:none;
opacity:0.6;">

Resend OTP (60)

</p>
    </div>

  <div id="staffForm" style="display:none;">

    <input
        type="email"
        id="staffEmail"
        placeholder="Staff Email">

    <br><br>

    <input
        type="text"
        id="staffId"
        placeholder="Staff ID">

    <br><br>

    <button
        class="login-btn"
        onclick="sendStaffOTP()">

        Send OTP

    </button>

    <br><br>

    <input
        type="text"
        id="staffOtp"
        placeholder="Enter OTP">

    <br><br>

    <button
        class="register-btn"
        onclick="verifyStaffOTP()">

        Verify OTP

    </button>

    <p
        id="staffOtpMessage"
        style="
        display:none;
        font-weight:bold;
        margin-top:10px;">

    </p>

    <p
        id="staffResendBtn"
        onclick="resendStaffOTP()"
        style="
        margin-top:10px;
        font-size:14px;
        color:#8B6B00;
        text-align:center;
        cursor:not-allowed;
        pointer-events:none;
        opacity:0.6;">

        Resend OTP (60)

    </p>

</div>

<div id="passwordSection" style="display:none;">

    <div class="password-box">

<input
type="password"
id="password"
placeholder="Password">

<span
class="toggle-password"
onclick="togglePassword('password', this)">

</span>

</div>

    <div class="password-box">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<span
class="toggle-password"
onclick="togglePassword('confirmPassword', this)">



</span>

</div>

    <button
        class="register-btn"
        onclick="validatePassword()">
        Register
    </button>

</div>

    
</div>

<script type="module">

    let generatedOTP = "";
    
    let countdown;
    let seconds = 60;
    let otpTime = 0;
    let otpSent = false;
    let generatedStaffOTP = "";
let staffOtpTime = 0;
let staffOtpSent = false;
let staffCountdown;
let staffSeconds = 60;

const userType = document.getElementById("userType");

userType.addEventListener("change", function(){

    document.getElementById("studentForm").style.display="none";
    document.getElementById("staffForm").style.display="none";
    document.getElementById("passwordSection").style.display="none";

    if(this.value==="student"){
        document.getElementById("studentForm").style.display="block";
        

         
    }

    if(this.value==="staff"){
        document.getElementById("staffForm").style.display="block";


    
    }
});

import { initializeApp } from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc
} from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvso-H8NVsXxpULHOplG_WketgfI4ErEk",
  authDomain: "geocampus-2026.firebaseapp.com",
  projectId: "geocampus-2026",
  storageBucket: "geocampus-2026.firebasestorage.app",
  messagingSenderId: "1090387175062",
  appId: "1:1090387175062:web:24abb9b76e8ac2bcc084b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function validateEmail(){

    let email =
    document.getElementById("studentEmail").value;

    if(email.trim().toLowerCase().endsWith("@tcarts.in")){

        alert("Valid College Email.\nOTP Sent Successfully.");

    } else {

        alert("Please enter a valid TC Arts Email ID.");
    }
}

async function sendOTP() {

    const email = document.getElementById("studentEmail").value.trim();

    if (!email.toLowerCase().endsWith("@tcarts.in")) {
        alert("Please enter a valid TC Arts Email ID");
        return;
    }

    if(otpSent){

    alert("OTP already sent.\nPlease Verify OTP or click Resend OTP.");

    return;

}

    generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
    otpTime = Date.now();

    try {

        await emailjs.send(
            "service_mqcxr1m",
            "template_g4bmqre",
            {
                email: email,
                passcode: generatedOTP
            }
        );

        alert("OTP Sent Successfully");

        otpSent = true;

        

        const resendBtn = document.getElementById("resendBtn");

resendBtn.style.pointerEvents = "none";
resendBtn.style.cursor = "not-allowed";
resendBtn.style.opacity = "0.6";

seconds = 60;

resendBtn.innerHTML = "Resend OTP (60)";

clearInterval(countdown);

countdown = setInterval(() => {

    seconds--;

    resendBtn.innerHTML =
    "Resend OTP (" + seconds + ")";

    if(seconds <= 0){

        clearInterval(countdown);

        resendBtn.innerHTML = "Resend OTP";

resendBtn.style.pointerEvents = "auto";
resendBtn.style.cursor = "pointer";
resendBtn.style.opacity = "1";
    }

},1000);

    } catch(error) {

        console.log(error);
        alert("Failed to send OTP");
    }
}

async function sendStaffOTP(){

    const email =
    document.getElementById("staffEmail").value.trim();

    if(email === ""){

        alert("Please enter Staff Email");
        return;

    }

    if(staffOtpSent){

        alert("OTP already sent.\nPlease Verify OTP or click Resend OTP.");
        return;

    }

    generatedStaffOTP =
    Math.floor(100000 + Math.random()*900000).toString();

    staffOtpTime = Date.now();

    try{

        await emailjs.send(

            "service_mqcxr1m",

            "template_g4bmqre",

            {

                email: email,
                passcode: generatedStaffOTP

            }

        );

        alert("OTP Sent Successfully");

        staffOtpSent = true;

        const resendBtn =
        document.getElementById("staffResendBtn");

        resendBtn.style.pointerEvents="none";
        resendBtn.style.cursor="not-allowed";
        resendBtn.style.opacity="0.6";

        staffSeconds = 60;

        resendBtn.innerHTML =
        "Resend OTP (60)";

        clearInterval(staffCountdown);

        staffCountdown = setInterval(()=>{

            staffSeconds--;

            resendBtn.innerHTML =
            "Resend OTP ("+staffSeconds+")";

            if(staffSeconds<=0){

                clearInterval(staffCountdown);

                resendBtn.innerHTML="Resend OTP";

                resendBtn.style.pointerEvents="auto";
                resendBtn.style.cursor="pointer";
                resendBtn.style.opacity="1";

            }

        },1000);

    }
    catch(error){

        console.log(error);

        alert("Failed to send OTP");

    }

}


async function resendOTP(){

    otpSent = false;

    await sendOTP();

}

function validateStaffEmail(){

    let email =
    document.getElementById("staffEmail").value;

    if(email === ""){

        alert("Please enter Staff Email ID");

    } else {

        alert("OTP Sent Successfully");
    }
}



function validateUserId(){

    let type =
    document.getElementById("userType").value;

    if(type==="student"){

        let reg =
        document.getElementById("studentRegNo").value;

        if(reg !== reg.toUpperCase()){

            alert(
            "Register Number must be in CAPITAL letters");
            return false;
        }
    }

    if(type==="staff"){

        let staff =
        document.getElementById("staffId").value;

        if(staff !== staff.toUpperCase()){

            alert(
            "Staff ID must be in CAPITAL letters");
            return false;
        }
    }


    return true;
}

function validatePassword(){

    const type = document.getElementById("userType").value;

if(type === "student"){

    const enteredOTP = document.getElementById("otp").value.trim();

    if(Date.now() - otpTime > 5 * 60 * 1000){
        alert("OTP Expired. Please click Send OTP again.");
        return;
    }

    if(enteredOTP !== generatedOTP){
        alert("Invalid OTP");
        return;
    }

}

if(type === "staff"){

    const enteredOTP = document.getElementById("staffOtp").value.trim();

    if(Date.now() - staffOtpTime > 5 * 60 * 1000){
        alert("OTP Expired. Please click Send OTP again.");
        return;
    }

    if(enteredOTP !== generatedStaffOTP){
        alert("Invalid OTP");
        return;
    }

}

    if(!validateUserId()){
    return;
}

    let password =
    document.getElementById("password").value;

    let confirmPassword =
    document.getElementById("confirmPassword").value;

    let strongPassword =
    /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    if(!strongPassword.test(password)){

        alert(
        "Password must contain:\n" +
        "- Minimum 8 characters\n" +
        "- One CAPITAL letter\n" +
        "- One small letter\n" +
        "- One number");

        return;
    }

    if(password !== confirmPassword){

        alert("Passwords do not match");
        return;
    }

    let email = "";

if(document.getElementById("userType").value === "student"){
    email = document.getElementById("studentEmail").value;
}

if(document.getElementById("userType").value === "staff"){
    email = document.getElementById("staffEmail").value;
}



createUserWithEmailAndPassword(
    auth,
    email,
    password
)
.then(async (userCredential) => {

    let userId = "";

if(document.getElementById("userType").value === "student"){
    userId = document.getElementById("studentRegNo").value;
}

if(document.getElementById("userType").value === "staff"){
    userId = document.getElementById("staffId").value;
}



await setDoc(
    doc(db, "users", userCredential.user.uid),
    {
        userType: document.getElementById("userType").value,
        email: email,
        userId: userId
    }
);

    alert("Registration Successful");

})
.catch((error) => {

    alert(error.message);

});
}
window.validateEmail = validateEmail;
window.validateStaffEmail = validateStaffEmail;
window.validatePassword = validatePassword;
function verifyOTP(){

    const msg =
    document.getElementById("otpMessage");

    const enteredOTP =
    document.getElementById("otp").value.trim();

    msg.style.display = "block";

    if(enteredOTP === ""){

        msg.style.color = "red";

        msg.innerHTML = "❌ No OTP Entered";

        return;

    }
    

    if(Date.now() - otpTime > 5 * 60 * 1000){

        msg.style.color = "red";

        msg.innerHTML = "❌ OTP Expired";

        return;

    }


    if(enteredOTP !== generatedOTP){

        msg.style.color = "red";

        msg.innerHTML = "❌ Invalid OTP";

        return;

    }

    msg.style.color = "green";

    msg.innerHTML = "✅ OTP Verified Successfully";

    document.getElementById("passwordSection").style.display = "block";

}

function verifyStaffOTP(){

    const enteredOTP =
    document.getElementById("staffOtp").value.trim();

    const msg =
    document.getElementById("staffOtpMessage");

    msg.style.display = "block";

    if(enteredOTP === ""){

        msg.style.color = "red";
        msg.innerHTML = "❌ Please Enter OTP";

        return;
    }

    


    if(Date.now() - staffOtpTime > 5 * 60 * 1000){

        msg.style.color = "red";
        msg.innerHTML = "❌ OTP Expired";

        return;
    }

    if(enteredOTP !== generatedStaffOTP){

        msg.style.color = "red";
        msg.innerHTML = "❌ Invalid OTP";

        return;
    }

    msg.style.color = "green";
    msg.innerHTML = "✅ OTP Verified Successfully";

    document.getElementById("passwordSection").style.display = "block";

}

async function resendStaffOTP(){

    staffOtpSent = false;

    await sendStaffOTP();

}

window.sendOTP = sendOTP;
window.resendOTP = resendOTP;
window.verifyOTP = verifyOTP;
window.sendStaffOTP = sendStaffOTP;
window.verifyStaffOTP = verifyStaffOTP;
window.resendStaffOTP = resendStaffOTP;
</script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("kkVrJsqzCb-KERnTR");
</script>

</body>


</html>
