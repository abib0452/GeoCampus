<!DOCTYPE html>
<html>
<head>
    <title>GeoCampus Register</title>
    <link rel="stylesheet" href="style.css">
    
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;

    background:linear-gradient(
        135deg,
        #FDF6EC 0%,
        #F7E7CE 50%,
        #EAD7BB 100%
    );
}

.container{

    width:450px;

    background:rgba(255,255,255,.65);

    backdrop-filter:blur(18px);

    padding:40px;

    border-radius:24px;

    border:2px solid #D4AF37;

    box-shadow:
    0 12px 35px rgba(0,0,0,.15),
    0 0 20px rgba(212,175,55,.25);

    color:#1E293B;

    text-align:center;

}



h1{

    margin-bottom:25px;

    font-size:34px;

    color:#8B6B00;

}


select,
input{

    width:100%;

    height:52px;

    padding-left:15px;

    margin:10px 0;

    background:#FFFDF8;

    color:#333;

    border:2px solid #D4AF37;

    border-radius:12px;

    outline:none;

    font-size:15px;

    transition:.3s;

}

input::placeholder{

    color:#8A8A8A;

}

input:focus,
select:focus{

    background:white;

    border-color:#C89B2B;

    box-shadow:0 0 10px rgba(212,175,55,.35);

}

.login-btn,
.register-btn{

    width:100%;

    height:52px;

    margin-top:12px;

    border:none;

    border-radius:12px;

    background:#D4AF37;

    color:#1E293B;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

.login-btn:hover,
.register-btn:hover{

    background:#F4C430;

    transform:translateY(-2px);

    box-shadow:0 8px 18px rgba(212,175,55,.35);

}

#studentForm,
#staffForm,
#hodForm,
#passwordSection{
    margin-top:15px;
    animation:fadeIn 0.4s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

input::placeholder{
    color:#666;
}

select{
    cursor:pointer;
}

@media(max-width:500px){
    .container{
        width:95%;
        padding:25px;
    }
}
</style>

</head>
<body>

<div class="container">

    <h1>Register</h1>

    <select id="userType">
        <option value="">Select User Type</option>
        <option value="student">Student</option>
        <option value="staff">Staff</option>
        <option value="hod">HOD</option>
    </select>

    <br><br>

    <div id="studentForm" style="display:none;">

        <input
            type="email"
            id="studentEmail"
            placeholder="TC Arts Email (@tcarts.in)">

        <br><br>

        <input
            type="text"
            id="studentRegNo"
            placeholder="Register Number">

        <br><br>

        <button
    class="login-btn"
    onclick="sendOTP()">
    Send OTP
</button>

        <br><br>

        <input
    type="text"
    id="otp"
    placeholder="Enter OTP">

    
    <br><br>

    <button
    id="resendBtn"
    class="login-btn"
    onclick="sendOTP()"
    disabled>
    Resend OTP (60)
</button>

</div>

    <div id="staffForm" style="display:none;">

    <input
        type="email"
        id="staffEmail"
        placeholder="Email">

    <br><br>

    <button
        class="login-btn"
        onclick="validateStaffEmail()">
        Send OTP
    </button>

    <br><br>

    <input
        type="text"
        placeholder="Enter OTP">

    <br><br>

    <input
        type="text"
        id="staffId"
        placeholder="Staff ID">

</div>
    <div id="hodForm" style="display:none;">

    <input
        type="email"
        id="hodEmail"
        placeholder="Email">

    <br><br>

    <button
        class="login-btn"
        onclick="validateHodEmail()">
        Send OTP
    </button>

    <br><br>

    <input
        type="text"
        placeholder="Enter OTP">

    <br><br>

    <input
        type="text"
        id="hodId"
        placeholder="HOD ID">

</div>

    <div id="passwordSection" style="display:none;">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <br><br>

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password">

    <br><br>

    <button
        class="register-btn"
        onclick="validatePassword()">
        Register
    </button>

</div>
</div>

<script type="module">

    let generatedOTP = "";
    
    let countdown;
    let seconds = 60;
    let otpTime = 0;

const userType = document.getElementById("userType");

userType.addEventListener("change", function(){

    document.getElementById("studentForm").style.display="none";
    document.getElementById("staffForm").style.display="none";
    document.getElementById("hodForm").style.display="none";
    document.getElementById("passwordSection").style.display="none";

    if(this.value==="student"){
        document.getElementById("studentForm").style.display="block";
         document.getElementById("passwordSection").style.display="block";
    }

    if(this.value==="staff"){
        document.getElementById("staffForm").style.display="block";
         document.getElementById("passwordSection").style.display="block";
    }

    if(this.value==="hod"){
        document.getElementById("hodForm").style.display="block";
         document.getElementById("passwordSection").style.display="block";
    }
});

import { initializeApp } from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc
} from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvso-H8NVsXxpULHOplG_WketgfI4ErEk",
  authDomain: "geocampus-2026.firebaseapp.com",
  projectId: "geocampus-2026",
  storageBucket: "geocampus-2026.firebasestorage.app",
  messagingSenderId: "1090387175062",
  appId: "1:1090387175062:web:24abb9b76e8ac2bcc084b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function validateEmail(){

    let email =
    document.getElementById("studentEmail").value;

    if(email.trim().toLowerCase().endsWith("@tcarts.in")){

        alert("Valid College Email.\nOTP Sent Successfully.");

    } else {

        alert("Please enter a valid TC Arts Email ID.");
    }
}

async function sendOTP() {

    const email = document.getElementById("studentEmail").value.trim();

    if (!email.toLowerCase().endsWith("@tcarts.in")) {
        alert("Please enter a valid TC Arts Email ID");
        return;
    }

    generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
    otpTime = Date.now();

    try {

        await emailjs.send(
            "service_mqcxr1m",
            "template_g4bmqre",
            {
                email: email,
                passcode: generatedOTP
            }
        );

        alert("OTP Sent Successfully");

        const resendBtn = document.getElementById("resendBtn");

resendBtn.disabled = true;

seconds = 60;

resendBtn.innerHTML = "Resend OTP (60)";

clearInterval(countdown);

countdown = setInterval(() => {

    seconds--;

    resendBtn.innerHTML =
    "Resend OTP (" + seconds + ")";

    if(seconds <= 0){

        clearInterval(countdown);

        resendBtn.disabled = false;

        resendBtn.innerHTML = "Resend OTP";

    }

},1000);

    } catch(error) {

        console.log(error);
        alert("Failed to send OTP");
    }
}

function validateStaffEmail(){

    let email =
    document.getElementById("staffEmail").value;

    if(email === ""){

        alert("Please enter Staff Email ID");

    } else {

        alert("OTP Sent Successfully");
    }
}

function validateHodEmail(){

    let email =
    document.getElementById("hodEmail").value;

    if(email === ""){

        alert("Please enter HOD Email ID");

    } else {

        alert("OTP Sent Successfully");
    }
}

function validateUserId(){

    let type =
    document.getElementById("userType").value;

    if(type==="student"){

        let reg =
        document.getElementById("studentRegNo").value;

        if(reg !== reg.toUpperCase()){

            alert(
            "Register Number must be in CAPITAL letters");
            return false;
        }
    }

    if(type==="staff"){

        let staff =
        document.getElementById("staffId").value;

        if(staff !== staff.toUpperCase()){

            alert(
            "Staff ID must be in CAPITAL letters");
            return false;
        }
    }

    if(type==="hod"){

        let hod =
        document.getElementById("hodId").value;

        if(hod !== hod.toUpperCase()){

            alert(
            "HOD ID must be in CAPITAL letters");
            return false;
        }

        if(!hod.includes("(HOD)")){

            alert(
            "HOD ID must contain (HOD)");
            return false;
        }
    }

    return true;
}

function validatePassword(){

    const enteredOTP = document.getElementById("otp").value.trim();

    if (Date.now() - otpTime > 5 * 60 * 1000) {
    alert("OTP Expired. Please click Send OTP again.");
    return;
}

if (enteredOTP !== generatedOTP) {
    alert("Invalid OTP");
    return;
}

    if(!validateUserId()){
    return;
}

    let password =
    document.getElementById("password").value;

    let confirmPassword =
    document.getElementById("confirmPassword").value;

    let strongPassword =
    /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    if(!strongPassword.test(password)){

        alert(
        "Password must contain:\n" +
        "- Minimum 8 characters\n" +
        "- One CAPITAL letter\n" +
        "- One small letter\n" +
        "- One number");

        return;
    }

    if(password !== confirmPassword){

        alert("Passwords do not match");
        return;
    }

    let email = "";

if(document.getElementById("userType").value === "student"){
    email = document.getElementById("studentEmail").value;
}

if(document.getElementById("userType").value === "staff"){
    email = document.getElementById("staffEmail").value;
}

if(document.getElementById("userType").value === "hod"){
    email = document.getElementById("hodEmail").value;
}

createUserWithEmailAndPassword(
    auth,
    email,
    password
)
.then(async (userCredential) => {

    let userId = "";

if(document.getElementById("userType").value === "student"){
    userId = document.getElementById("studentRegNo").value;
}

if(document.getElementById("userType").value === "staff"){
    userId = document.getElementById("staffId").value;
}

if(document.getElementById("userType").value === "hod"){
    userId = document.getElementById("hodId").value;
}

await setDoc(
    doc(db, "users", userCredential.user.uid),
    {
        userType: document.getElementById("userType").value,
        email: email,
        userId: userId
    }
);

    alert("Registration Successful");

})
.catch((error) => {

    alert(error.message);

});
}
window.validateEmail = validateEmail;
window.validateStaffEmail = validateStaffEmail;
window.validateHodEmail = validateHodEmail;
window.validatePassword = validatePassword;
window.sendOTP = sendOTP;

</script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("kkVrJsqzCb-KERnTR");
</script>

</body>


</html>
