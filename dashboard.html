function getLocation(){

    if(!navigator.geolocation){

        alert(
        "Geolocation is not supported in this browser");
        return;
    }

    navigator.permissions.query({name:"geolocation"}).then(function(result){

    if(result.state === "denied"){

        alert("📍 Please Enable Location Permission and Reload the App");
        return;
    }

});

    navigator.geolocation.watchPosition(

        function(position){

            let latitude =
            position.coords.latitude;

            let longitude =
            position.coords.longitude;

            myLat = latitude;
            myLon = longitude;

            
            // Calculate distance from college

            
            
        
            if(!map){

if(insideCampus){

map.setZoom(17);

 if(user){

doc(db,"users",user.uid),

async function searchUser(){

    document.getElementById("searchResult").innerHTML =
"⏳ Searching...";

    let searchId =
    document.getElementById(
        "searchUser"
    ).value.trim();

    if(searchId === ""){
        alert("Enter User ID");
        return;
    }

    if(myLat === undefined || myLon === undefined){
        alert("Waiting for your location...");
        return;
    }

    const q = query(
        collection(db,"users"),
        where("userId","==",searchId)
    );

    const querySnapshot =
    await getDocs(q);

  if(querySnapshot.empty){

    document.querySelector(".info").style.display = "block";

    document.getElementById("userId").innerHTML = "";

    document.getElementById("searchResult").innerHTML = "";

    document.getElementById("status").innerHTML =
    "🔴 Status : User Not Registered";

    document.getElementById("distance").innerHTML = "";

    document.getElementById("lastUpdated").innerHTML = "";

    document.getElementById("campusStatus").innerHTML = "";


    if(userMarker){
        userMarker.setMap(null);
        userMarker = null;
    }

    return;
}
    querySnapshot.forEach((userDoc)=>{

    

        document.querySelector(".info").style.display = "block";

        let data = userDoc.data();

        let userLat =
        data.latitude;

        let userLon =
        data.longitude;

        const userLocation = new google.maps.LatLng(
    userLat,
    userLon
);

const userInsideCampus =
google.maps.geometry.poly.containsLocation(
    userLocation,
    campusPolygon
);

        let userStatus = data.status || "Offline";

let lastUpdated =
data.lastUpdated || "--";

let campus =
data.campusStatus || "--";

       let distance =
Math.sqrt(
    Math.pow(userLat - myLat, 2) +
    Math.pow(userLon - myLon, 2)
) * 111;

document.getElementById("searchResult").innerHTML =
"🔍 Search : ✅ User Found";

document.getElementById("status").innerHTML =
(userStatus === "Online")
? "🟢 Online"
: "🔴 Offline";

// Distance
if(userStatus === "Online"){

    document.getElementById("distance").innerHTML =
    "📍 Distance : " +
    distance.toFixed(2) +
    " KM";

}else{

    document.getElementById("distance").innerHTML =
    "📍 Distance : Not Available";

}
        document.getElementById(
    "userId"
).innerHTML =
"👤 User : " + searchId;

document.getElementById(

"🕒 Last Updated : " +
lastUpdated;

if(userStatus === "Online"){

    ? "🏫 Campus : ✅ Inside Campus"
    : "🏫 Campus : ❌ Outside Campus";

}else{

}

        // remove old markers
        if(myMarker){

        }

}

}else{

            lng:userLon

async function logoutUser(){

    const user = auth.currentUser;

    if(user){

        await updateDoc(
            doc(db,"users",user.uid),
            {
                status: "Offline"
            }
        );

        await signOut(auth);

        alert("Logged Out Successfully");

        window.location.href = "login.html";

    }

}

window.logoutUser = logoutUser;

window.addEventListener("beforeunload", async function () {

    const user = auth.currentUser;

    if(user){

        await updateDoc(
            doc(db,"users",user.uid),
            {
                status:"Offline"
            }
        );

    }

});

window.onload = function(){

    }

};

    sidebar.classList.toggle("closed");
