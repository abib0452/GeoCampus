<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#FFF8F0 0%,
#F8E9D2 50%,
#E9D5B5 100%
);
}

.box{

width:420px;

background:rgba(255,255,255,.65);

backdrop-filter:blur(18px);

padding:40px;

border-radius:24px;

text-align:center;

color:#1E293B;

border:2px solid #D4AF37;

box-shadow:
0 12px 35px rgba(0,0,0,.15),
0 0 20px rgba(212,175,55,.25);

}

h2{

margin-bottom:20px;

font-size:32px;

color:#8B6B00;

}

input{

width:100%;

height:52px;

padding-left:15px;

margin:12px 0;

background:#FFFDF8;

color:#333;

border:2px solid #D4AF37;

border-radius:12px;

outline:none;

font-size:16px;

transition:.3s;

}

input::placeholder{

color:#8A8A8A;

}

input:focus{

background:white;

border-color:#C89B2B;

box-shadow:0 0 10px rgba(212,175,55,.35);

}

button{

width:100%;

height:52px;

margin-top:15px;

background:#D4AF37;

color:#1E293B;

border:none;

border-radius:12px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#F4C430;

transform:translateY(-2px);

box-shadow:0 8px 18px rgba(212,175,55,.35);

}

.back{
margin-top:20px;
}

.back a{

color:#8B6B00;

text-decoration:none;

font-weight:600;

}

.back a:hover{

color:#A67C00;

text-decoration:underline;

}

</style>

</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<input
type="email"
id="email"
placeholder="Enter Registered Email">

<button onclick="sendOTP()">
Send OTP
</button>

<div id="otpSection" style="display:none;">

    <input
        type="text"
        id="otp"
        placeholder="Enter OTP">

    <button onclick="verifyOTP()">
        Verify OTP
    </button>

    <p
id="otpVerifiedMsg"
style="
display:none;
font-weight:bold;
margin-top:10px;">

</p>

</div>

<div id="passwordSection" style="display:none;">

    <input
        type="password"
        id="newPassword"
        placeholder="New Password">

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password">

    <button onclick="updatePassword()">
        Update Password
    </button>

</div>



<div class="back">
<a href="login.html">
← Back to Login
</a>
</div>

</div>




<script type="module">

    import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getAuth,
    sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvso-H8NVsXxpULHOplG_WketgfI4ErEk",
  authDomain: "geocampus-2026.firebaseapp.com",
  projectId: "geocampus-2026",
  storageBucket: "geocampus-2026.firebasestorage.app",
  messagingSenderId: "1090387175062",
  appId: "1:1090387175062:web:24abb9b76e8ac2bcc084b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let generatedOTP = "";

async function sendOTP(){

    const email =
    document.getElementById("email").value.trim();

    if(email == ""){

        alert("Enter your registered Email");
        return;

    }

    generatedOTP =
    Math.floor(100000 + Math.random() * 900000).toString();

    try{

        await emailjs.send(

            "service_mqcxr1m",

            "template_g4bmqre",

            {
                email: email,
                passcode: generatedOTP
            }

        );

        alert("OTP Sent Successfully");
        document.getElementById("otpVerifiedMsg").style.display = "none";
        document.getElementById("otpSection").style.display = "block";

    }catch(error){

        console.log(error);

        alert("Failed to send OTP");

    }

}

async function verifyOTP() {

    const enteredOTP =
    document.getElementById("otp").value.trim();

    const msg =
    document.getElementById("otpVerifiedMsg");

    msg.style.display = "block";

    if(enteredOTP === ""){

        msg.style.color = "red";
        msg.innerHTML = "❌ No OTP Entered";

        return;

    }

    if(enteredOTP !== generatedOTP){

        msg.style.color = "red";
        msg.innerHTML = "❌ OTP Not Verified";

        return;

    }

    msg.style.color = "green";
    msg.innerHTML = "✅ OTP Verified Successfully";

    document.getElementById("passwordSection").style.display = "block";

}

async function updatePassword() {

    const email = document.getElementById("email").value.trim();

    const newPassword = document.getElementById("newPassword").value;

    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword === "" || confirmPassword === "") {
        alert("Please enter password");
        return;
    }

    if (newPassword !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    try {

        const response = await fetch("https://geocampus-api.onrender.com/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                newPassword
            })
        });

        const result = await response.json();

        if (result.success) {

            alert("✅ Password Updated Successfully");

            window.location.href = "login.html";

        } else {

            alert(result.message);

        }

    } catch (error) {

        console.error(error);

        alert("Server Error");

    }

}

window.sendOTP = sendOTP;
window.verifyOTP = verifyOTP;
window.updatePassword = updatePassword;


</script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>


<script>
emailjs.init("kkVrJsqzCb-KERnTR");
</script>

</body>
</html>
